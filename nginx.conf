events {}
http {
    server {
        listen 80;
        server_name localhost;
        include /etc/nginx/mime.types;
        root /usr/share/nginx/html;
        location / {
            try_files $uri /index.html;
        }
        location /api {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://back;
        }
    }
}