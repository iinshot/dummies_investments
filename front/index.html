<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummies Investments</title>
</head>
<body>
    <p>Hello world!</p>
    <button id="tryApiButton">Try api</button>
    <p id="fetchResultParagraph"></p>
</body>
<script>
    document.getElementById("tryApiButton").addEventListener("click", function(e) {
        fetch("/api/").then(response => response.json()).then(data => document.getElementById("fetchResultParagraph").textContent = JSON.stringify(data));
    });
</script>
</html>
