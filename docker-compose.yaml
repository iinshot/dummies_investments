name: dummies_investments
services:
  front:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./front:/var/www/dummies_investments/html
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app
    depends_on:
      - back

  back:
    build: ./back
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  db:
    image: postgres:latest
    restart: always
    env_file: "db.env"
    environment:
      POSTGRES_DB: dummies_investments
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - app

volumes:
  pgdata:
    driver: local

networks:
  app:
    name: app